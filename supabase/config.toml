# Supabase CLI configuration
# See: https://supabase.com/docs/guides/cli/config

project_id = "replace-with-your-project-ref"

[db]
port = 54322
shadow_port = 54320
major_version = 15

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = true

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

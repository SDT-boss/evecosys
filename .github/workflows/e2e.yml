name: E2E

on:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.css') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-

      # NEXT_PUBLIC_* vars are baked into the JS bundle at build time —
      # they must match the Supabase project the E2E suite runs against.
      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Standalone output needs public/ and .next/static/ copied alongside server.js
      - name: Prepare standalone server assets
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      # Push any pending migrations to staging so the test DB schema matches
      # the branch. supabase db push is idempotent — safe to run on every PR.
      # The SUPABASE_DB_URL password may contain special characters (@ # etc.)
      # that Go's net/url parser rejects without percent-encoding — encode first.
      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Push pending migrations to staging
        run: |
          # urlparse fails in Python 3.12 when the password contains [ or @.
          # Use plain string splitting instead — only quote() is needed from urllib.
          ENCODED_URL=$(python3 - <<'PYEOF'
import os, sys
from urllib.parse import quote
url = os.environ.get('SUPABASE_DB_URL', '')
if not url:
    sys.exit('SUPABASE_DB_URL secret is not set')
scheme_end = url.find('://')
if scheme_end < 0:
    print(url); sys.exit(0)
scheme = url[:scheme_end + 3]        # e.g. 'postgresql://'
rest   = url[scheme_end + 3:]        # 'user:pass@host:port/db'
last_at = rest.rfind('@')
if last_at < 0:
    print(url); sys.exit(0)
creds     = rest[:last_at]           # 'user:pass'
host_part = rest[last_at + 1:]       # 'host:port/db'
colon = creds.find(':')
if colon < 0:
    print(url); sys.exit(0)
user     = creds[:colon]
password = creds[colon + 1:]
print(f"{scheme}{user}:{quote(password, safe='')}@{host_part}")
PYEOF
          )
          supabase db push --db-url "$ENCODED_URL"
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      # global-setup.ts writes storageState files here before tests run
      - name: Create auth state directory
        run: mkdir -p e2e/.auth

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_MANAGER_EMAIL: ${{ secrets.E2E_MANAGER_EMAIL }}
          E2E_DRIVER_EMAIL: ${{ secrets.E2E_DRIVER_EMAIL }}
          E2E_BOARD_EMAIL: ${{ secrets.E2E_BOARD_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            e2e/reports/html/
            playwright-report/
          retention-days: 14

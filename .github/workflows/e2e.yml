name: E2E

on:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.css') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-

      # NEXT_PUBLIC_* vars are baked into the JS bundle at build time —
      # they must match the Supabase project the E2E suite runs against.
      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Standalone output needs public/ and .next/static/ copied alongside server.js
      - name: Prepare standalone server assets
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      # Push any pending migrations to staging so the test DB schema matches
      # the branch. supabase db push is idempotent — safe to run on every PR.
      #
      # ⚠️  SUPABASE_DB_URL must be the SESSION POOLER connection string —
      #     the direct connection (db.*.supabase.co) requires IPv6, which
      #     GitHub Actions runners do not support.
      #
      #     Get it from: Supabase Dashboard → your project → Connect →
      #     "Session pooler" tab → copy the connection string.
      #     Then update the SUPABASE_DB_URL secret in:
      #     GitHub → repo → Settings → Secrets and variables → Actions →
      #     Environments → staging → SUPABASE_DB_URL
      #
      #     Session pooler URL format:
      #     postgresql://postgres.[ref]:[password]@aws-0-[region].pooler.supabase.com:5432/postgres
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push pending migrations to staging
        continue-on-error: true
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::warning::SUPABASE_DB_URL is not set — skipping migration push"
            exit 0
          fi
          if echo "$SUPABASE_DB_URL" | grep -q 'db\..*\.supabase\.co'; then
            echo "::warning::SUPABASE_DB_URL is the IPv6 direct connection URL."
            echo "::warning::Update it to the session pooler URL (Supabase Dashboard → Connect → Session pooler)"
            echo "::warning::Skipping migration push — staging schema may be out of date"
            exit 0
          fi
          ENCODED_URL=$(python3 -c 'import os; from urllib.parse import quote; u=os.environ.get("SUPABASE_DB_URL",""); s=u.find("://"); r=u[s+3:] if s>=0 else ""; a=r.rfind("@"); c=r[:a].find(":") if a>=0 else -1; print(u[:s+3]+r[:c+1]+quote(r[c+1:a],safe="")+r[a:] if s>=0 and a>=0 and c>=0 else u)')
          supabase db push --db-url "$ENCODED_URL"
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      # global-setup.ts writes storageState files here before tests run
      - name: Create auth state directory
        run: mkdir -p e2e/.auth

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_MANAGER_EMAIL: ${{ secrets.E2E_MANAGER_EMAIL }}
          E2E_DRIVER_EMAIL: ${{ secrets.E2E_DRIVER_EMAIL }}
          E2E_BOARD_EMAIL: ${{ secrets.E2E_BOARD_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            e2e/reports/html/
            playwright-report/
          retention-days: 14

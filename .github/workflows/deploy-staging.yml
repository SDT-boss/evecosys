name: Deploy → Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Run migrations
        run: supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"

  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    environment: staging
    needs: migrate
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # GHCR/Docker require lowercase repository names; github.repository
      # (SDT-boss/evecosys) is mixed-case, so compute a lowercase image ref.
      - name: Compute lowercase image ref
        id: img
        run: echo "ref=$(echo "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.img.outputs.ref }}:staging
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.ref }}:staging
          format: table
          exit-code: '1'
          vuln-type: os,library
          severity: CRITICAL
          trivyignores: .trivyignore

  deploy:
    name: Release to server
    runs-on: ubuntu-latest
    environment: staging
    needs: build-and-push
    timeout-minutes: 10

    steps:
      - name: Compute lowercase image ref
        id: img
        run: echo "ref=$(echo "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ${{ steps.img.outputs.ref }}:staging
            docker stop evecosys-staging 2>/dev/null || true
            docker rm   evecosys-staging 2>/dev/null || true
            docker run -d \
              --name evecosys-staging \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file /etc/evecosys/staging.env \
              ${{ steps.img.outputs.ref }}:staging
            docker image prune -f

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    environment: staging
    needs: deploy
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create auth state directory
        run: mkdir -p e2e/.auth

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_MANAGER_EMAIL: ${{ secrets.E2E_MANAGER_EMAIL }}
          E2E_DRIVER_EMAIL: ${{ secrets.E2E_DRIVER_EMAIL }}
          E2E_BOARD_EMAIL: ${{ secrets.E2E_BOARD_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging
          path: |
            e2e/reports/html/
            playwright-report/
          retention-days: 7

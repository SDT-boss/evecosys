name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint & type safety ─────────────────────────────────────────────
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npx tsc --noEmit

  # ── Job 2: Unit tests ─────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm test -- --run

  # ── Job 3: Design tokens pipeline ────────────────────────────────────────
  tokens:
    name: Design tokens
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Build tokens
        run: npm run build:tokens
      - name: Check for uncommitted token drift
        run: |
          if ! git diff --quiet design-system/tokens/; then
            echo "Token output is out of sync with tokens.json — run 'make tokens' and commit the result"
            git diff design-system/tokens/
            exit 1
          fi

  # ── Job 4: Production build + runtime startup check ──────────────────────
  build:
    name: Build & startup check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-build-check
      - name: Start app and health check
        run: |
          node .next/standalone/server.js &
          SERVER_PID=$!
          timeout 30 bash -c 'until curl -sf -o /dev/null http://localhost:3000; do sleep 1; done'
          echo "Server responded — startup check passed"
          kill $SERVER_PID
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-build-check
          PORT: 3000

  # ── Job 5: Dependency vulnerability audit ────────────────────────────────
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm audit --audit-level=high

  # ── Job 6: Dependency vulnerability review (PR delta) ────────────────────
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          comment-summary-in-pr: always

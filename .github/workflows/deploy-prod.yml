name: Deploy → Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      reason:
        description: Reason for manual deployment
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Run migrations
        run: supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"

  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    environment: production
    needs: migrate
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # GHCR/Docker require lowercase repository names; github.repository
      # (SDT-boss/evecosys) is mixed-case, so compute a lowercase image ref.
      - name: Compute lowercase image ref
        id: img
        run: echo "ref=$(echo "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=prod-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.ref }}:${{ steps.tag.outputs.value }}
            ${{ steps.img.outputs.ref }}:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.ref }}:${{ steps.tag.outputs.value }}
          format: table
          exit-code: '1'
          vuln-type: os,library
          severity: CRITICAL
          trivyignores: .trivyignore

  deploy:
    name: Release to server
    runs-on: ubuntu-latest
    environment: production
    needs: build-and-push
    timeout-minutes: 10

    steps:
      - name: Compute lowercase image ref
        id: img
        run: echo "ref=$(echo "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=prod-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            PREV=$(docker inspect evecosys-prod --format='{{.Config.Image}}' 2>/dev/null || echo "")
            echo "$PREV" > /etc/evecosys/prev_image.txt
            docker pull ${{ steps.img.outputs.ref }}:${{ steps.tag.outputs.value }}
            docker stop evecosys-prod 2>/dev/null || true
            docker rm   evecosys-prod 2>/dev/null || true
            docker run -d \
              --name evecosys-prod \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file /etc/evecosys/prod.env \
              ${{ steps.img.outputs.ref }}:${{ steps.tag.outputs.value }}
            docker image prune -f

  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    environment: production
    needs: deploy
    timeout-minutes: 5

    steps:
      - name: Health check
        run: |
          url="${{ secrets.PROD_URL }}"
          for i in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$status" = "200" ] || [ "$status" = "307" ]; then
              echo "Health check passed (HTTP $status)"
              exit 0
            fi
            echo "Attempt $i: HTTP $status — retrying in 10s"
            sleep 10
          done
          echo "Health check failed after 3 attempts"
          exit 1

  rollback:
    name: Rollback on smoke failure
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy, smoke]
    if: always() && needs.deploy.result == 'success' && needs.smoke.result != 'success'
    timeout-minutes: 10

    steps:
      - name: Roll back to previous image
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            PREV=$(cat /etc/evecosys/prev_image.txt 2>/dev/null || echo "")
            if [ -z "$PREV" ]; then
              echo "No previous image recorded — manual rollback required"
              exit 1
            fi
            echo "Rolling back to: $PREV"
            docker stop evecosys-prod 2>/dev/null || true
            docker rm   evecosys-prod 2>/dev/null || true
            docker run -d \
              --name evecosys-prod \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file /etc/evecosys/prod.env \
              "$PREV"
            echo "Rollback complete"
